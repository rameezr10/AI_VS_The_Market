<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI VS THE MARKET</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0a0a0a',
                        cyanGlow: '#00f3ff',
                    },
                    fontFamily: {
                        sans: ['Inter', 'ui-sans-serif', 'system-ui', 'sans-serif'],
                    }
                }
            }
        }
    </script>
    <style>
        .glow-button {
            box-shadow: 0 0 15px rgba(0, 243, 255, 0.5);
            transition: all 0.3s ease;
        }

        .glow-button:hover {
            box-shadow: 0 0 25px rgba(0, 243, 255, 0.8);
            transform: scale(1.05);
        }
    </style>
</head>

<body
    class="bg-darkBg text-white h-screen overflow-hidden flex items-center justify-center font-sans uppercase tracking-wide">

    <!-- Background Image -->
    <div class="absolute inset-0 z-0">
        <img src="{{ url_for('static', filename='images/Landing_page_background.jpeg') }}" alt="Background"
            class="w-full h-full object-cover opacity-100">
        <!-- Gradient Overlay for readability -->
        <div class="absolute inset-0 bg-gradient-to-b from-darkBg/80 via-darkBg/60 to-darkBg/90"></div>
    </div>

    <!-- Main Content -->
    <main class="relative z-10 flex flex-col items-center text-center px-6">

        <h1 class="text-6xl md:text-8xl font-black mb-2 tracking-tighter">
            AI VS
        </h1>
        <h1
            class="text-6xl md:text-8xl font-black text-transparent bg-clip-text bg-gradient-to-r from-cyanGlow to-blue-500 mb-8 tracking-tighter">
            THE MARKET
        </h1>

        <p class="text-sm md:text-lg text-gray-300 tracking-[0.2em] max-w-2xl mx-auto mb-12 leading-relaxed">
            PREDICTING INTRADAY STOCK MOVEMENTS WITH MACHINE LEARNING
        </p>

        <a href="/technical"
            class="group relative inline-flex items-center justify-center px-8 py-4 font-bold text-cyanGlow border-2 border-cyanGlow glow-button bg-black/50 overflow-hidden">
            <span
                class="absolute inset-0 w-full h-full -mt-1 rounded-lg opacity-30 bg-gradient-to-b from-transparent via-transparent to-black"></span>
            <span class="relative z-10 tracking-[0.15em]">ENTER THE MARKETPLACE</span>
        </a>

    </main>

</body>

</html>
